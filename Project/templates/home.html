<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Attrition Predictor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:800px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
    color:#444;
}

input,select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
}

.btn{
    width:100%;
    margin-top:25px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#5563d8;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#2c3e50;
}

@media(max-width:768px){
    .form-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="container">

    <h1>Employee Attrition Prediction</h1>

    <form action="/predict" method="POST">

        <div class="form-grid">

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="Age" required>
            </div>

            <div class="form-group">
                <label>Monthly Income</label>
                <input type="number" name="MonthlyIncome" required>
            </div>

            <div class="form-group">
                <label>OverTime</label>
                <select name="OverTime">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="form-group">
                <label>Stock Option Level</label>
                <input type="number" min="0" max="3" name="StockOptionLevel" required>
            </div>

            <div class="form-group">
                <label>Job Level</label>
                <input type="number" min="1" max="5" name="JobLevel" required>
            </div>

            <div class="form-group">
                <label>Department</label>
                <select name="Department">
                    <option value="0">Human Resources</option>
                    <option value="1">Research & Development</option>
                    <option value="2">Sales</option>
                </select>
            </div>

            <div class="form-group">
                <label>Job Involvement</label>
                <input type="number" min="1" max="4" name="JobInvolvement" required>
            </div>

            <div class="form-group">
                <label>Business Travel</label>
                <select name="BusinessTravel">
                    <option value="0">Non-Travel</option>
                    <option value="1">Travel Frequently</option>
                    <option value="2">Travel Rarely</option>
                </select>
            </div>

            <div class="form-group">
                <label>Years In Current Role</label>
                <input type="number" name="YearsInCurrentRole" required>
            </div>

            <div class="form-group">
                <label>Marital Status</label>
                <select name="MaritalStatus">
                    <option value="0">Divorced</option>
                    <option value="1">Married</option>
                    <option value="2">Single</option>
                </select>
            </div>

            <div class="form-group">
                <label>Environment Satisfaction</label>
                <input type="number" min="1" max="4" name="EnvironmentSatisfaction" required>
            </div>

            <div class="form-group">
                <label>Performance Rating</label>
                <input type="number" min="1" max="4" name="PerformanceRating" required>
            </div>

            <div class="form-group">
                <label>Job Satisfaction</label>
                <input type="number" min="1" max="4" name="JobSatisfaction" required>
            </div>

            <div class="form-group">
                <label>Total Working Years</label>
                <input type="number" name="TotalWorkingYears" required>
            </div>

            <div class="form-group">
                <label>Work Life Balance</label>
                <input type="number" min="1" max="4" name="WorkLifeBalance" required>
            </div>

        </div>

        <button class="btn" type="submit">
            Predict Attrition Risk
        </button>

    </form>

    {% if prediction_text %}
    <div class="result">
        {{ prediction_text }}
    </div>
    {% endif %}

</div>

</body>
</html>
