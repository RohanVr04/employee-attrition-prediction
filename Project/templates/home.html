<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Employee Attrition Predictor</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <!-- ================= Header ================= -->

    <header class="hero">

        <h1>Employee Attrition Predictor</h1>

        <p>
            AI-powered employee retention analysis using an
            XGBoost Machine Learning model.
        </p>

    </header>


    <form action="/predict" method="POST" id="predictionForm">


        <!-- ================= Employee Information ================= -->

        <section class="card">

            <h2>👤 Employee Information</h2>

            <div class="grid">

                <div class="input-group">

                    <label for="Age">

                        Age

                    </label>

                    <input
                        id="Age"
                        name="Age"
                        type="number"
                        placeholder="e.g. 32"
                        min="18"
                        max="65"
                        required>

                </div>


                <div class="input-group">

                    <label for="MonthlyIncome">

                        Monthly Income

                    </label>

                    <input
                        id="MonthlyIncome"
                        name="MonthlyIncome"
                        type="number"
                        placeholder="e.g. 6500"
                        min="1000"
                        required>

                </div>


                <div class="input-group">

                    <label>

                        Marital Status

                    </label>

                    <select name="MaritalStatus">

                        <option value="0">

                            Divorced

                        </option>

                        <option value="1">

                            Married

                        </option>

                        <option value="2">

                            Single

                        </option>

                    </select>

                </div>


                <div class="input-group">

                    <label>

                        Department

                    </label>

                    <select name="Department">

                        <option value="0">

                            Human Resources

                        </option>

                        <option value="1">

                            Research & Development

                        </option>

                        <option value="2">

                            Sales

                        </option>

                    </select>

                </div>

            </div>

        </section>



        <!-- ================= Job Information ================= -->

        <section class="card">

            <h2>💼 Job Information</h2>

            <div class="grid">


                <div class="input-group">

                    <label>

                        Job Level

                    </label>

                    <select name="JobLevel">

                        <option value="1">Level 1</option>

                        <option value="2">Level 2</option>

                        <option value="3">Level 3</option>

                        <option value="4">Level 4</option>

                        <option value="5">Level 5</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>

                        Stock Option Level

                    </label>

                    <select name="StockOptionLevel">

                        <option value="0">0</option>

                        <option value="1">1</option>

                        <option value="2">2</option>

                        <option value="3">3</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>

                        Business Travel

                    </label>

                    <select name="BusinessTravel">

                        <option value="0">

                            Non Travel

                        </option>

                        <option value="1">

                            Travel Frequently

                        </option>

                        <option value="2">

                            Travel Rarely

                        </option>

                    </select>

                </div>


                <div class="input-group">

                    <label>

                        Overtime

                    </label>

                    <select name="OverTime">

                        <option value="0">

                            No

                        </option>

                        <option value="1">

                            Yes

                        </option>

                    </select>

                </div>


                <div class="input-group">

                    <label>

                        Total Working Years

                    </label>

                    <input
                        type="number"
                        name="TotalWorkingYears"
                        min="0"
                        placeholder="e.g. 8"
                        required>

                </div>


                <div class="input-group">

                    <label>

                        Years in Current Role

                    </label>

                    <input
                        type="number"
                        name="YearsInCurrentRole"
                        min="0"
                        placeholder="e.g. 3"
                        required>

                </div>

            </div>

        </section>



        <!-- ================= Work Environment ================= -->

        <section class="card">

            <h2>🏢 Work Environment</h2>

            <div class="grid">


                <div class="input-group">

                    <label>

                        Job Involvement

                    </label>

                    <select name="JobInvolvement">

                        <option value="1">Low</option>

                        <option value="2">Medium</option>

                        <option value="3">High</option>

                        <option value="4">Very High</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>

                        Environment Satisfaction

                    </label>

                    <select name="EnvironmentSatisfaction">

                        <option value="1">Low</option>

                        <option value="2">Medium</option>

                        <option value="3">High</option>

                        <option value="4">Very High</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>

                        Job Satisfaction

                    </label>

                    <select name="JobSatisfaction">

                        <option value="1">Low</option>

                        <option value="2">Medium</option>

                        <option value="3">High</option>

                        <option value="4">Very High</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>

                        Work-Life Balance

                    </label>

                    <select name="WorkLifeBalance">

                        <option value="1">Poor</option>

                        <option value="2">Fair</option>

                        <option value="3">Good</option>

                        <option value="4">Excellent</option>

                    </select>

                </div>


                <div class="input-group">

                    <label>

                        Performance Rating

                    </label>

                    <select name="PerformanceRating">

                        <option value="1">Low</option>

                        <option value="2">Good</option>

                        <option value="3">Excellent</option>

                        <option value="4">Outstanding</option>

                    </select>

                </div>

            </div>

        </section>


        <!-- ================= Submit ================= -->

        <button
            type="submit"
            id="predictButton"
            class="predict-btn">

            Analyze Employee

        </button>


    </form>


    <footer>

        <p>

            Powered by Flask • XGBoost • Scikit-Learn

        </p>

    </footer>

</div>

<script>

const form = document.getElementById("predictionForm");

const btn = document.getElementById("predictButton");

form.addEventListener("submit",function(){

    btn.innerHTML="Analyzing...";

    btn.disabled=true;

});

</script>

</body>
</html>
